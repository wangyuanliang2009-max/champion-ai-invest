<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>冠军模式 AI 投资助手</title>
  <style>
    :root {
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --radius: 8px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --primary: #00B4A4; --primary-hover: #009688; --primary-light: #e0f7f4;
      --danger: #EF4444; --success: #10B981; --warning: #F59E0B;
      --bg-page: #f5f7fa; --bg-card: #ffffff; --bg-input: #f1f3f6;
      --text-primary: #1a1d26; --text-secondary: #5c6370; --text-muted: #8b929e;
      --border: #e2e6ed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); font-size: 14px; color: var(--text-primary); background: var(--bg-page); line-height: 1.5; }
    .app-container { min-height: 100vh; display: flex; flex-direction: column; }
    .hidden { display: none !important; }
    .btn { border: none; border-radius: var(--radius); padding: 8px 16px; font-size: 14px; cursor: pointer; }
    .btn-primary { background: var(--primary); color: white; } .btn-primary:hover { background: var(--primary-hover); }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-outline { border: 1px solid var(--border); background: transparent; color: var(--text-secondary); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .card { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow-sm); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-rule { background: var(--primary-light); color: var(--primary); }
    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .message { margin-bottom: 16px; }
    .message .bubble { background: var(--bg-card); border-radius: var(--radius); padding: 12px 16px; box-shadow: var(--shadow-sm); white-space: pre-wrap; word-break: break-word; }
    .message.user .bubble { background: var(--primary-light); }
    .message .meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .green { color: var(--success); } .red { color: var(--danger); }
  </style>
</head>
<body>
  <div id="app" class="app-container">
    <header style="display:flex; align-items:center; justify-content:space-between; background:var(--bg-card); padding:0 16px; height:60px; box-shadow:var(--shadow-sm);">
      <div style="display:flex; align-items:center; gap:12px;">
        <h1 style="font-size:18px; font-weight:700;">冠军模式投资助手</h1>
        <span class="badge badge-rule">已启用</span>
      </div>
      <div style="display:flex; gap:8px;">
        <button id="btnManualCheck" class="btn btn-outline btn-sm">🔍 核查减持</button>
        <button id="btnSettings" class="btn btn-ghost btn-sm">⚙️ 设置</button>
      </div>
    </header>
    <div style="display:flex; flex:1; overflow:hidden;">
      <aside style="width:260px; border-right:1px solid var(--border); background:var(--bg-card); padding:12px; display:flex; flex-direction:column; gap:12px;">
        <div class="card">
          <div style="display:flex; justify-content:space-between; padding:10px 12px; border-bottom:1px solid var(--border);"><h3>自选股</h3><button id="btnRefreshWatchlist" class="btn btn-ghost btn-sm">🔄</button></div>
          <div style="padding:12px;">
            <div style="display:flex; gap:8px; margin-bottom:12px;"><input id="stockInput" placeholder="代码 (如 002409.SZ)" style="flex:1; padding:8px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-input);"><button id="btnAddStock" class="btn btn-primary btn-sm">添加</button></div>
            <ul id="watchlist" style="list-style:none; max-height:300px; overflow-y:auto;"></ul>
          </div>
        </div>
      </aside>
      <main style="flex:1; display:flex; flex-direction:column;">
        <div style="padding:10px 16px; border-bottom:1px solid var(--border); display:flex; gap:6px; background:var(--bg-card);">
          <button class="btn btn-outline btn-sm" data-action="deep_analyze">深度分析</button>
          <button class="btn btn-outline btn-sm" data-action="quick_scan">快速扫描</button>
          <button class="btn btn-outline btn-sm" data-action="risk_check">风险排查</button>
          <button class="btn btn-outline btn-sm" data-action="valuation">估值分析</button>
        </div>
        <div id="chatMessages" style="flex:1; overflow-y:auto; padding:16px; background:var(--bg-page);"><div style="text-align:center; color:var(--text-muted); margin-top:40px;">输入股票代码开始分析</div></div>
        <div style="border-top:1px solid var(--border); background:var(--bg-card); padding:12px 16px;">
          <textarea id="chatInput" rows="2" placeholder="输入分析指令、股票代码..." style="width:100%; padding:10px; border:1px solid var(--border); border-radius:var(--radius); resize:none; background:var(--bg-input);"></textarea>
          <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:8px;"><button id="btnClearChat" class="btn btn-ghost btn-sm">清屏</button><button id="btnSend" class="btn btn-primary">发送分析</button></div>
        </div>
      </main>
    </div>
    <footer style="display:flex; justify-content:space-between; padding:4px 16px; font-size:12px; color:var(--text-muted); background:var(--bg-card); border-top:1px solid var(--border);"><span id="statusText">就绪</span><span id="statusTime">--</span></footer>
    <div id="loadingOverlay" class="loading-overlay hidden"><div class="spinner"></div><p id="loadingText">分析中...</p></div>
  </div>

  <!-- 设置面板 -->
  <div id="settingsModal" class="hidden" style="position:fixed; inset:0; z-index:2000; display:flex; align-items:center; justify-content:center;">
    <div style="position:absolute; inset:0; background:rgba(0,0,0,0.4);" onclick="closeSettings()"></div>
    <div class="card" style="position:relative; width:90%; max-width:420px;">
      <div style="display:flex; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border);"><h3>设置</h3><button onclick="closeSettings()" class="btn btn-ghost btn-sm">✕</button></div>
      <div style="padding:16px; display:flex; flex-direction:column; gap:10px;">
        <label>DeepSeek API 密钥 <span style="color:var(--danger);">*必填</span></label><input type="password" id="apiKeyInput" placeholder="sk-..." style="padding:8px; border:1px solid var(--border); border-radius:var(--radius);">
        <label>豆包 API 密钥 <span style="color:var(--text-muted);">(选填)</span></label><input type="password" id="doubaoApiKeyInput" placeholder="ark-..." style="padding:8px; border:1px solid var(--border); border-radius:var(--radius);">
        <label>豆包模型接入点ID <span style="color:var(--text-muted);">(选填)</span></label><input type="text" id="doubaoModelInput" placeholder="ep-..." style="padding:8px; border:1px solid var(--border); border-radius:var(--radius);">
        <label>WACC 基准 (%)</label><input type="number" id="waccInput" value="8.0" step="0.5" min="4" max="15" style="padding:8px; border:1px solid var(--border); border-radius:var(--radius);">
        <label>永续增长率 (%)</label><input type="number" id="growthInput" value="2.0" step="0.1" min="0" max="5" style="padding:8px; border:1px solid var(--border); border-radius:var(--radius);">
      </div>
      <div style="padding:12px 16px; text-align:right;"><button id="btnSaveSettings" class="btn btn-primary">保存</button></div>
    </div>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    let watchlist = [], chatHistory = [], selectedStock = null;

    function setLoadingText(t) { const el = $('#loadingText'); if(el) el.textContent = t; }

    // ===== 豆包调用（回退到基础格式，不要求JSON，只要求自然语言+原始摘要）=====
    async function askDoubao(prompt) {
      const key = localStorage.getItem('doubao_key'), model = localStorage.getItem('doubao_model');
      if (!key || !model) throw new Error('豆包未配置');
      const res = await fetch('/api/doubao', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: JSON.stringify({ model, messages: [{ role: 'user', content: prompt }], stream: false })
      });
      if (!res.ok) {
        const errText = await res.text();
        console.error('豆包API错误:', res.status, errText);
        throw new Error(`豆包API ${res.status}`);
      }
      const d = await res.json();
      return d.choices[0].message.content;
    }

    // ===== 行情（豆包→腾讯）=====
    async function fetchQuote(p) {
      const key = 'q_' + p.secid;
      const cached = JSON.parse(localStorage.getItem(key) || 'null');
      if (cached && Date.now() - cached.t < 60000) return cached.data;
      
      try {
        const txt = await askDoubao(`联网搜索 ${p.secucode} 最新股价和涨跌幅，只返回：价格xx，涨跌xx%`);
        const priceMatch = txt.match(/价格\s*(\d+\.?\d*)/);
        const pctMatch = txt.match(/涨跌\s*(-?\d+\.?\d*)%?/);
        if (priceMatch) {
          const result = { name: p.secucode, price: +priceMatch[1], changePct: pctMatch ? +pctMatch[1] : null, source: '豆包' };
          localStorage.setItem(key, JSON.stringify({ data: result, t: Date.now() }));
          return result;
        }
      } catch(e) { console.log('豆包行情失败'); }

      // 备用腾讯
      try {
        const r = await fetchFromTencent(p);
        if (r?.price > 0) { localStorage.setItem(key, JSON.stringify({ data: r, t: Date.now() })); return r; }
      } catch(e) {}
      
      if (cached) return cached.data;
      return { name: p.secucode, price: null, changePct: null, source: '获取失败' };
    }

    async function fetchFromTencent(p) {
      const code = p.isHK ? `hk${p.code}` : p.secucode.replace('.', '').toLowerCase();
      const res = await fetch(`https://qt.gtimg.cn/q=${code}`);
      const buf = await res.arrayBuffer();
      const text = new TextDecoder('gbk').decode(buf);
      const arr = text.split('~');
      return { name: arr[1], price: +arr[3], changePct: +arr[32], source: '腾讯' };
    }

    // ===== 财务数据（豆包搜索+带来源的原始摘要）=====
    async function fetchFinance(p) {
      const cacheKey = 'fin_' + p.secid;
      const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
      if (cached && Date.now() - cached.t < 1800000) return cached.data;

      try {
        const txt = await askDoubao(`搜索 ${p.secucode} 最近3个财年的年报和最新季报的营收、净利润。对于每一个数据点，必须明确注明数据来源（如“2024年年报显示...”）和具体数字。`);
        const result = [{ period: '最新', summary: txt, source: '豆包' }];
        localStorage.setItem(cacheKey, JSON.stringify({ data: result, t: Date.now() }));
        return result;
      } catch(e) { console.log('豆包财务失败'); }

      if (cached) return cached.data;
      return [];
    }

    // ===== 新闻 =====
    async function fetchNews(p) {
      try {
        const txt = await askDoubao(`搜索 ${p.secucode} ${p.name||''} 今天最重要的5条新闻，每条新闻必须注明来源（如“来自东方财富”），并标注情绪。如果没有新闻，就说“无最新新闻”。`);
        return txt;
      } catch(e) { return '新闻获取失败'; }
    }

    // ===== DeepSeek =====
    async function callDeepSeek(msgs) {
      const key = localStorage.getItem('ds_key'); if (!key) throw new Error('请配置DeepSeek密钥');
      const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: JSON.stringify({ model: 'deepseek-chat', messages: msgs, temperature: 0, max_tokens: 8192 })
      });
      if (res.status === 429 || res.status === 503) throw new Error('DeepSeek繁忙，请稍后重试');
      if (!res.ok) throw new Error(`API ${res.status}`);
      return (await res.json()).choices[0].message.content;
    }

    // ===== 核心分析 =====
    document.getElementById('btnSend').addEventListener('click', async () => {
      const text = $('#chatInput').value.trim(); if (!text) return;
      if (!localStorage.getItem('ds_key')) { openSettings(); return; }
      const uMsg = { role: 'user', content: text, time: new Date().toLocaleTimeString() };
      chatHistory.push(uMsg); appendMessageUI(uMsg); $('#chatInput').value = '';
      showLoading(true); setLoadingText('获取行情中...');
      try {
        const codes = extractCodes(text);
        let evidence = [], newsText = '';
        for (const c of codes.slice(0, 2)) {
          const q = await fetchQuote(c);
          evidence.push(`【公司名称】${q.name || c.secucode} (来源:${q.source})`);
          evidence.push(`【最新股价】${q.price?.toFixed(2) || '获取失败'} (来源:${q.source})`);

          setLoadingText('获取财务数据中...');
          const fin = await fetchFinance(c);
          if (fin.length > 0) {
            fin.forEach(d => evidence.push(`【财务数据_${d.period}】${d.summary} (来源:${d.source || '多源'})`));
          } else {
            evidence.push('【财务数据】暂不可用');
          }

          setLoadingText('获取新闻中...');
          newsText = await fetchNews(c);

          if (c.isHK) evidence.push(`【减持核查】https://sc.hkexnews.hk/TuniS/di.hkex.com.hk/di/NSSrchCorp.aspx?src=MAIN&lang=ZH&g_lang=zh-HK&stockid=${c.code}`);
          else evidence.push(`【减持核查】http://data.eastmoney.com/dxf/q/${c.code}.html`);
        }

        setLoadingText('DeepSeek分析中...');
        const sp = `【冠军模式铁律】
1. 报告中的数据必须来自提供的【证据数据】和【新闻】。如果数据缺失或错误，必须明确指出。
2. 报告格式：风险速览→消息面→公司速览→财务透视→行业格局→估值→多空辩论(≥3v3)→投资建议(红绿灯)→数据溯源。
3. 利空前标【利空】，利好前标【利好】。
4. 必须提醒核查大股东减持。`;
        const prompt = `${text}\n\n【证据数据】\n${evidence.join('\n')}\n\n【新闻】\n${newsText}`;
        const msgs = [{ role: 'system', content: sp }, ...chatHistory.slice(-4).map(m => ({ role: m.role, content: m.content }))];
        msgs.push({ role: 'user', content: prompt });
        const reply = await callDeepSeek(msgs);
        const aMsg = { role: 'assistant', content: reply, time: new Date().toLocaleTimeString() };
        chatHistory.push(aMsg); appendMessageUI(aMsg);
      } catch (e) { appendMessageUI({ role: 'assistant', content: `分析失败: ${e.message}`, time: '' }); }
      finally { showLoading(false); }
    });

    // ===== UI辅助 =====
    function appendMessageUI(m) { const d = document.createElement('div'); d.className = 'message ' + m.role; d.innerHTML = `<div class="bubble">${escapeHtml(m.content)}</div><div class="meta">${m.time}</div>`; $('#chatMessages').appendChild(d); }
    function showLoading(s) { $('#loadingOverlay').classList.toggle('hidden', !s); }
    function escapeHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function openSettings() { $('#settingsModal').classList.remove('hidden'); }
    function closeSettings() { $('#settingsModal').classList.add('hidden'); }

    // 设置保存
    document.getElementById('btnSaveSettings').addEventListener('click', () => {
      localStorage.setItem('ds_key', $('#apiKeyInput').value.trim());
      localStorage.setItem('doubao_key', $('#doubaoApiKeyInput').value.trim());
      localStorage.setItem('doubao_model', $('#doubaoModelInput').value.trim());
      localStorage.setItem('wacc', $('#waccInput').value || '8.0');
      localStorage.setItem('growth', $('#growthInput').value || '2.0');
      closeSettings();
      alert('设置已保存！');
    });

    // 手动核查
    document.getElementById('btnManualCheck').addEventListener('click', () => {
      const codes = selectedStock ? [selectedStock] : watchlist;
      if (!codes.length) { alert('请先添加自选股'); return; }
      let u = ''; codes.forEach(s => { const c = (typeof s === 'string' ? s : s.secucode || '').replace(/\.(SZ|SH|HK)$/i, ''); if (s.isHK || /\.HK/i.test(s)) u += `<a href="https://sc.hkexnews.hk/TuniS/di.hkex.com.hk/di/NSSrchCorp.aspx?src=MAIN&lang=ZH&g_lang=zh-HK&stockid=${c}" target="_blank">港交所(${c})</a><br>`; else u += `<a href="https://data.eastmoney.com/dxf/q/${c}.html" target="_blank">东方财富(${c})</a><br>`; });
      const w = window.open('', '_blank', 'width=800,height=600'); w.document.write(`<h3>手动核查减持</h3>${u}`);
    });

    // 股票代码解析
    function extractCodes(t) { const s = new Set(), r = []; const h = /\b(\d{1,5})\.HK\b/gi, a = /\b(\d{6})\.(SZ|SH)\b/gi; let m; while ((m = h.exec(t))) { const c = m[1].padStart(5, '0'); if (!s.has(c)) { s.add(c); r.push({ secucode: c + '.HK', secid: '116.' + c, code: c, isHK: true }); } } while ((m = a.exec(t))) { const c = m[1]; if (!s.has(c)) { s.add(c); r.push({ secucode: c + '.' + m[2], secid: (m[2] === 'SZ' ? '0' : '1') + '.' + c, code: c, isHK: false }); } } return r; }

    // 自选股
    document.getElementById('btnAddStock').addEventListener('click', () => {
      const v = $('#stockInput').value.trim(); const c = extractCodes(v)[0]; if (!c) { alert('代码无效'); return; }
      if (watchlist.find(s => s.secid === c.secid)) { alert('已存在'); return; }
      watchlist.push(c); localStorage.setItem('watchlist', JSON.stringify(watchlist)); $('#stockInput').value = ''; renderWatchlist();
    });
    function renderWatchlist() { const e = $('#watchlist'); e.innerHTML = watchlist.length ? watchlist.map(s => `<li style="padding:6px; cursor:pointer;" data-secid="${s.secid}">${s.secucode}</li>`).join('') : '<li style="color:var(--text-muted);">无自选股</li>'; }

    // 初始化
    (function init() {
      watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]'); renderWatchlist();
      if (localStorage.getItem('ds_key')) $('#apiKeyInput').value = localStorage.getItem('ds_key');
      if (localStorage.getItem('doubao_key')) $('#doubaoApiKeyInput').value = localStorage.getItem('doubao_key');
      if (localStorage.getItem('doubao_model')) $('#doubaoModelInput').value = localStorage.getItem('doubao_model');
      if (localStorage.getItem('wacc')) $('#waccInput').value = localStorage.getItem('wacc');
      if (localStorage.getItem('growth')) $('#growthInput').value = localStorage.getItem('growth');
    })();
  </script>
</body>
</html>
