<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>冠军模式 AI 投资助手</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app" class="app-container">
    <!-- 顶部导航 -->
    <header class="app-header">
      <h1>冠军模式投资助手</h1>
      <div class="header-actions">
        <button id="btnDarkMode" title="深色模式">🌙</button>
        <button id="btnSettings" title="设置">⚙️</button>
      </div>
    </header>

    <!-- 操作模式切换栏（盘前/盘中/盘后/信息分析） -->
    <nav class="mode-tabs">
      <button class="mode-tab active" data-mode="chat">分析对话</button>
      <button class="mode-tab" data-mode="premarket">盘前速览</button>
      <button class="mode-tab" data-mode="postmarket">盘后体检</button>
      <button class="mode-tab" data-mode="info">产业/信息解析</button>
    </nav>

    <div class="main-layout">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="watchlist-section">
          <div class="section-header">
            <h3>自选股</h3>
            <button id="btnRefreshWatchlist" title="刷新行情">🔄</button>
          </div>
          <input type="text" id="stockInput" placeholder="添加代码 (如 002409.SZ)" />
          <button id="btnAddStock" class="btn btn-sm">添加</button>
          <ul id="watchlist" class="watchlist"></ul>
        </div>
        <div class="reduction-alert" id="reductionAlert"></div>
      </aside>

      <!-- 主分析区 -->
      <main class="main">
        <!-- 快速操作栏（一键选择分析类型） -->
        <div class="quick-actions" id="quickActions">
          <button class="action-chip" data-action="deep_analyze">深度分析</button>
          <button class="action-chip" data-action="quick_scan">快速扫描</button>
          <button class="action-chip" data-action="risk_check">风险排查</button>
          <button class="action-chip" data-action="valuation">估值分析</button>
          <button class="action-chip" data-action="debate">多空辩论</button>
          <button class="action-chip" data-action="info_extract">提取标的</button>
        </div>
        <!-- 文件/图片上传区 -->
        <div class="file-upload" id="fileUploadArea">
          <label for="fileInput" class="upload-label">📎 拖拽或点击上传文件/图片 (豆包分析)</label>
          <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.csv,.xlsx" style="display:none" multiple />
        </div>
        <!-- 对话/报告展示区 -->
        <div class="chat-messages" id="chatMessages"></div>
        <!-- 输入区 -->
        <div class="input-area">
          <textarea id="chatInput" rows="2" placeholder="输入股票代码、指令或粘贴产业信息..."></textarea>
          <div class="input-actions">
            <button id="btnClearChat" class="btn btn-ghost">清屏</button>
            <button id="btnSend" class="btn btn-primary">发送分析</button>
          </div>
        </div>
      </main>
    </div>

    <!-- 底部状态栏 -->
    <footer class="status-bar">
      <span id="statusText">就绪</span>
      <span id="statusTime">--</span>
      <span class="rules-badge" id="rulesBadge">冠军模式已启用</span>
    </footer>

    <!-- 加载动画 -->
    <div id="loadingOverlay" class="loading-overlay hidden">分析中...</div>
  </div>

  <!-- 设置模态框（保持原有） -->
  <div id="settingsModal" class="modal hidden">...</div>
  <!-- 规则管理面板（保持原有） -->
  <div id="rulesPanel" class="rules-panel hidden">...</div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/rules.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
