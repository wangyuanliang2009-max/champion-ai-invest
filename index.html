<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>冠军模式 AI 投资助手</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app" class="app-container">
    <!-- 顶部通栏 -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">冠军模式投资助手</h1>
        <span class="badge badge-rule" id="rulesBadge">冠军模式已启用</span>
      </div>
      <div class="header-right">
        <button id="btnDarkMode" class="btn-icon" title="深色模式">🌙</button>
        <button id="btnSettings" class="btn-icon" title="设置">⚙️</button>
      </div>
    </header>

    <!-- 模式导航 -->
    <nav class="nav-tabs">
      <button class="tab active" data-mode="chat">分析对话</button>
      <button class="tab" data-mode="premarket">盘前速览</button>
      <button class="tab" data-mode="postmarket">盘后体检</button>
      <button class="tab" data-mode="info">产业/信息解析</button>
    </nav>

    <!-- 主内容区 -->
    <div class="main-content">
      <aside class="sidebar" id="sidebar">
        <div class="card watchlist-card">
          <div class="card-header">
            <h3 class="card-title">自选股</h3>
            <button id="btnRefreshWatchlist" class="btn-icon-sm" title="刷新行情">🔄</button>
          </div>
          <div class="card-body">
            <div class="input-row">
              <input type="text" id="stockInput" placeholder="代码 (如 002409.SZ)" />
              <button id="btnAddStock" class="btn btn-primary btn-sm">添加</button>
            </div>
            <ul id="watchlist" class="watchlist"></ul>
          </div>
        </div>
        <div id="reductionAlert" class="alert alert-danger hidden"></div>
      </aside>

      <main class="main">
        <!-- 快捷操作工具栏 -->
        <div class="toolbar" id="quickActions">
          <span class="toolbar-label">常用：</span>
          <button class="chip chip-primary" data-action="deep_analyze">深度分析</button>
          <button class="chip chip-warning" data-action="quick_scan">快速扫描</button>
          <button class="chip chip-danger" data-action="risk_check">风险排查</button>
          <span class="toolbar-separator">|</span>
          <button class="chip chip-secondary" data-action="valuation">估值分析</button>
          <button class="chip chip-secondary" data-action="debate">多空辩论</button>
          <button class="chip chip-secondary" data-action="info_extract">提取标的</button>
        </div>

        <!-- 文件上传 -->
        <div class="upload-area" id="fileUploadArea">
          <label for="fileInput" class="upload-label">📎 点击上传文件/图片 (豆包分析)</label>
          <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.csv,.xlsx" style="display:none" multiple />
        </div>

        <!-- 对话/报告展示区 -->
        <div class="chat-container" id="chatMessages">
          <div class="chat-placeholder">输入股票代码或分析指令开始</div>
        </div>

        <!-- 底部输入区 -->
        <div class="input-area">
          <textarea id="chatInput" rows="2" placeholder="输入分析指令、股票代码或粘贴产业信息..."></textarea>
          <div class="input-actions">
            <button id="btnClearChat" class="btn btn-ghost">清屏</button>
            <button id="btnManualCheck" class="btn btn-outline" title="打开港交所/东方财富手动查询减持">🔍 核查</button>
            <button id="btnSend" class="btn btn-primary">发送分析</button>
          </div>
        </div>
      </main>
    </div>

    <!-- 底部状态栏 -->
    <footer class="status-bar">
      <span id="statusText">就绪</span>
      <span id="statusTime">--</span>
    </footer>

    <!-- 加载遮罩 -->
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="spinner"></div>
      <p>分析中...</p>
    </div>
  </div>

  <!-- 设置模态框 -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content card">
      <div class="modal-header">
        <h3>设置</h3>
        <button id="btnCloseSettings" class="btn-icon-sm">✕</button>
      </div>
      <div class="modal-body">
        <label>DeepSeek API 密钥</label>
        <input type="password" id="apiKeyInput" placeholder="sk-..." />
        <label>豆包 API 密钥（行情与新闻）</label>
        <input type="password" id="doubaoApiKeyInput" placeholder="sk-..." />
        <label>模型</label>
        <select id="modelSelect">
          <option value="deepseek-chat">deepseek-chat</option>
          <option value="deepseek-reasoner">deepseek-reasoner</option>
        </select>
      </div>
      <div class="modal-footer">
        <button id="btnSaveSettings" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- 规则管理面板 -->
  <div id="rulesPanel" class="panel hidden">
    <div class="panel-header">
      <h3>规则管理</h3>
      <button id="btnCloseRules" class="btn-icon-sm">✕</button>
    </div>
    <div class="panel-body">
      <div id="rulesList"></div>
      <div class="rule-input-row">
        <input type="text" id="newRuleInput" placeholder="新增规则..." />
        <button id="btnAddRule" class="btn btn-primary btn-sm">添加</button>
        <button id="btnRuleMic" class="btn btn-ghost btn-sm">🎤</button>
      </div>
    </div>
  </div>

  <!-- 移动端导航 -->
  <div class="mobile-nav">
    <button id="navChat" class="active">💬 对话</button>
    <button id="navRules">📋 规则</button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/rules.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
